# ❄️ Hyprland Compositor Configuration
# This file is managed declaratively via Home Manager.
# It defines compositor behavior, decoration properties (like background blur), and keybindings.

# --- Monitor Setup ---
# Automatically detect and configure display scale and resolution
monitor=,preferred,auto,auto

# --- General Properties ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cdd6f4ee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# --- Visual Styling & Decoration ---
decoration {
    rounding = 10

    # 🌪️ Background Blur Configuration
    # Required to support DankMaterialShell translucent dynamic components and blur checks
    blur {
        enabled = true
        size = 8
        passes = 3
        newOptimizations = true
        ignore_opacity = true # Apply blur regardless of window transparency levels
    }
}

# --- Compositor Layer Rules ---
# Forces background blur rendering underneath DankMaterialShell panels and menus
layerrule = blur, dms
layerrule = ignorezero, dms
layerrule = blur, dms-shell
layerrule = ignorezero, dms-shell

# --- Window Rules ---
# Sets default opacity to ensure the terminal window background displays blur nicely
windowrulev2 = opacity 0.95 0.95, class:^(Alacritty)$

# --- Key Bindings ---
$mainMod = SUPER

# Base Application Launchers
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, wofi --show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Workspace Navigation (Vim-style navigation)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse Bindings (Move / Resize)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
